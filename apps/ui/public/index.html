<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Amadeus Panner Dev</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>Amadeus Panner</h1>
    <div id="statusLine" class="status-line">Connecting...</div>
  </header>

  <main class="layout">
    <section class="panel controls-panel">
      <h2>Show Control</h2>
      <div class="row">
        <input id="showPathInput" type="text" value="showfiles/_template/show.json" />
        <button id="loadShowBtn" type="button">Load Showfile</button>
      </div>
      <p id="showInfo" class="muted">No show loaded</p>

      <h3>Scenes</h3>
      <div id="sceneButtons" class="button-grid"></div>

      <h3>Actions</h3>
      <div id="actionButtons" class="action-list"></div>
    </section>

    <section class="panel panner-panel">
      <h2>3D Panner</h2>
      <canvas id="pannerCanvas" width="760" height="460"></canvas>
      <div class="camera-controls">
        <label for="cameraYaw">Yaw</label><input id="cameraYaw" type="range" min="-180" max="180" step="1" value="35" />
        <label for="cameraPitch">Pitch</label><input id="cameraPitch" type="range" min="8" max="80" step="1" value="26" />
        <label for="cameraDistance">Zoom</label><input id="cameraDistance" type="range" min="140" max="720" step="1" value="320" />
      </div>
      <div class="camera-row">
        <button id="cameraResetBtn" type="button">Reset View</button>
        <span id="cameraReadout" class="muted">Yaw 35, Pitch 26, Zoom 320</span>
      </div>
      <p class="muted">Drag an object to move on X/Z plane. Hold Shift while dragging to adjust Y. Drag empty space to orbit camera. Use mouse wheel to zoom.</p>
    </section>

    <section class="panel inspector-panel">
      <h2>Object Inspector</h2>
      <label for="objectSelect">Object</label>
      <select id="objectSelect"></select>

      <div class="field-grid">
        <label>X</label><input id="xInput" type="number" step="0.1" min="-100" max="100" />
        <label>Y</label><input id="yInput" type="number" step="0.1" min="-100" max="100" />
        <label>Z</label><input id="zInput" type="number" step="0.1" min="-100" max="100" />
        <label>Size</label><input id="sizeInput" type="number" step="0.1" min="0" max="100" />
        <label>Gain (dB)</label><input id="gainInput" type="number" step="0.1" min="-120" max="12" />
        <label>Algorithm</label><input id="algorithmInput" type="text" />
      </div>

      <label class="checkbox-row" for="muteInput">
        <input id="muteInput" type="checkbox" /> Mute
      </label>

      <button id="applyObjectBtn" type="button">Apply Object Update</button>
    </section>

    <section class="panel log-panel">
      <h2>Debug Events</h2>
      <div id="eventLog" class="event-log"></div>
    </section>
  </main>

  <script src="/app.js" type="module"></script>
</body>
</html>
